<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button {
            margin: 10px 0;
            padding: 8px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>氣泡排序法示範</h1>
    <p>請輸入一個數組（用逗號分隔數字，例如：5,3,8,1,2）：</p>
    <input type="text" id="arrayInput" placeholder="輸入數組">
    <button onclick="sortArray()">排序</button>
    <div id="result"></div>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // 交換元素
                        let temp = arr[j];
                        arr[j] = arr[j + 1];
                        arr[j + 1] = temp;
                    }
                }
            }
            return arr;
        }

        function sortArray() {
            let input = document.getElementById('arrayInput').value;
            let arr = input.split(',').map(Number).filter(n => !isNaN(n));
            if (arr.length === 0) {
                document.getElementById('result').innerHTML = '請輸入有效的數組。';
                return;
            }
            let original = [...arr];
            let sorted = bubbleSort(arr);
            document.getElementById('result').innerHTML = 
                '<p>原始數組：' + original.join(', ') + '</p>' +
                '<p>排序後數組：' + sorted.join(', ') + '</p>';
        }
    </script>
</body>
</html>
